apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: adaptive-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: admin-api
          image: ghcr.io/yolk-art/adaptive-inference-admin-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: adaptive-inference-config
            - secretRef:
                name: adaptive-inference-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: adaptive-inference
spec:
  selector:
    app: admin-api
  ports:
    - port: 8003
      targetPort: 8003
