apiVersion: apps/v1
kind: Deployment
metadata:
  name: retraining-worker
  namespace: adaptive-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retraining-worker
  template:
    metadata:
      labels:
        app: retraining-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: worker
          image: ghcr.io/yolk-art/adaptive-inference-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: adaptive-inference-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
