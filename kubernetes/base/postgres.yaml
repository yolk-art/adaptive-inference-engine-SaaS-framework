apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: adaptive-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mlops
            - name: POSTGRES_USER
              value: mlops
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adaptive-inference-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: adaptive-inference
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
