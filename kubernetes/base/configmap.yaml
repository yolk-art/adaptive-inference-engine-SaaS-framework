apiVersion: v1
kind: ConfigMap
metadata:
  name: adaptive-inference-config
  namespace: adaptive-inference
data:
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  DATABASE_URL: postgresql+psycopg2://mlops:mlops@postgres:5432/mlops
  DEVICE: cpu
  RETRAINING_SIMULATION_SECONDS: "0.1"
